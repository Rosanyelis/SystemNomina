name: Deploy Sistema de Nomina

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: sistema-nomina

    steps:
      - name: Comprobar secrets de despliegue
        env:
          CONTABO_HOST: ${{ secrets.CONTABO_HOST }}
          CONTABO_USER: ${{ secrets.CONTABO_USER }}
          CONTABO_PASSWORD: ${{ secrets.CONTABO_PASSWORD }}
          CLOUDPANEL_PROJECT_PATH: ${{ secrets.CLOUDPANEL_PROJECT_PATH }}
          DEPLOY_BRANCH: ${{ secrets.DEPLOY_BRANCH }}
        run: |
          missing=0
          if [ -z "$CONTABO_HOST" ]; then echo "::error::Falta CONTABO_HOST en el environment sistema-nomina."; missing=1; fi
          if [ -z "$CONTABO_USER" ]; then echo "::error::Falta CONTABO_USER en el environment sistema-nomina."; missing=1; fi
          if [ -z "$CONTABO_PASSWORD" ]; then echo "::error::Falta CONTABO_PASSWORD en el environment sistema-nomina."; missing=1; fi
          if [ -z "$CLOUDPANEL_PROJECT_PATH" ]; then echo "::error::Falta CLOUDPANEL_PROJECT_PATH en el environment sistema-nomina."; missing=1; fi
          if [ -z "$DEPLOY_BRANCH" ]; then echo "::error::Falta DEPLOY_BRANCH en el environment sistema-nomina (ej. main)."; missing=1; fi
          exit $missing

      - name: Deploy por SSH en Contabo / CloudPanel
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.CONTABO_HOST }}
          username: ${{ secrets.CONTABO_USER }}
          password: ${{ secrets.CONTABO_PASSWORD }}
          port: ${{ secrets.CONTABO_PORT || '22' }}
          script_stop: true
          script: |
            set -e

            PROJECT_PATH="${{ secrets.CLOUDPANEL_PROJECT_PATH }}"
            BRANCH="${{ secrets.DEPLOY_BRANCH }}"

            cd "$PROJECT_PATH"

            if [ ! -d "$PROJECT_PATH/.git" ]; then
              git init
              git remote add origin https://github.com/Rosanyelis/SystemNomina.git
              git fetch origin "$BRANCH"
              git checkout -f -B "$BRANCH" "origin/$BRANCH"
            fi

            git fetch origin "$BRANCH"
            git checkout "$BRANCH"
            git reset --hard "origin/$BRANCH"

            composer install --prefer-dist --optimize-autoloader --no-interaction
            php artisan migrate:fresh --force --seed

            rm -rf node_modules
            npm install
            npm run build

            php artisan optimize:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            php artisan storage:link
